site_name: jaxquantum
site_url: https://jaxquantum.org
use_directory_urls: false
repo_url: https://github.com/EQuS/jaxquantum
repo_name: jaxquantum

exclude_docs: |
  scripts/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy
  logo: assets/logo.png
  favicon: assets/favicon.ico
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default 
      primary: purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: purple
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
copyright: "&copy Copyright 2022-2025, JAXQuantum developers."
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/EQuS/jaxquantum
plugins:
  - search
  - mkdocs-jupyter:
      execute: false
      include: ["*.ipynb"]
  - gen-files:
      scripts:
      - docs/gen_ref_pages.py
  - literate-nav:
      nav_file: summary.md
  - section-index
  - mkdocstrings:
      watch:
      - docs
      - jaxquantum
markdown_extensions:
  - toc
  - admonition
  - attr_list
  - md_in_html
  - codehilite
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - "."
        - "docs"
      check_paths: true
  - pymdownx.details
  - pymdownx.tabbed
  - pymdownx.extra
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.arithmatex:
      generic: true

extra_css:
  - stylesheets/landing.css

extra_javascript:
  - js/mathjax-config.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - About:
    - index.md
    - Overview: about/overview.md
    - Community: about/community.md
    - Contributors: about/contributors.md
    - Citation: about/citation.md
  - Documentation:
    - documentation/index.md
    - Getting Started:
      - Installation: documentation/getting_started/installation.md
      - Qarray: documentation/getting_started/qarray.ipynb
      - The Sharp Bits 🔪: documentation/getting_started/sharp_bits.md
    - Tutorials:
      - documentation/tutorials/index.md
      - Devices & Systems: documentation/tutorials/devices.ipynb
      - Bosonic Codes: documentation/tutorials/bosonic_codes.ipynb
      - Circuits: documentation/tutorials/circuits.ipynb
      - Sparse Backends: documentation/tutorials/sparse_backends.ipynb
      - cuQuantum Backend: documentation/tutorials/cuquantum.ipynb
  - Code Reference: reference/